<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroAGI Ops Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d0d0f;
      --surface:  #16161a;
      --surface2: #1e1e26;
      --border:   #2a2a35;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --accent:   #7c6af7;
      --accent2:  #5b4fd4;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Inter', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; }
    #root { height: 100%; display: flex; flex-direction: column; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 0; }
    .main { flex: 1; overflow-y: auto; background: var(--bg); }

    /* Sidebar */
    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .brand { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .sidebar-logo .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .nav-section { margin-bottom: 20px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 8px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500; transition: all 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(124,106,247,0.15); color: var(--accent); }
    .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
    .sidebar-footer .env-badge { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--surface2); padding: 4px 8px; border-radius: 4px; display: inline-block; }

    /* Top bar */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: var(--sans); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status dots */
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .dot-red { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .dot-gray { background: var(--muted); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .dot-pulse { animation: pulse 2s infinite; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-body { padding: 16px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); font-family: var(--mono); }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(42,42,53,0.6); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .name-cell { font-weight: 500; color: var(--text); }
    .email-cell { font-size: 11px; color: var(--muted); }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-green { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-amber { background: rgba(245,158,11,0.12); color: var(--amber); }
    .badge-red { background: rgba(239,68,68,0.12); color: var(--red); }
    .badge-blue { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge-purple { background: rgba(124,106,247,0.12); color: var(--accent); }
    .badge-gray { background: rgba(107,107,128,0.12); color: var(--muted); }

    /* Progress bar */
    .progress { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; width: 80px; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* Agent graph */
    .agent-graph { padding: 24px; }
    .pipeline { display: flex; flex-direction: column; gap: 0; }
    .pipeline-row { display: flex; align-items: center; gap: 0; }
    .pipeline-node { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; min-width: 200px; position: relative; }
    .pipeline-node.active { border-color: var(--accent); }
    .pipeline-node.source { border-color: var(--blue); }
    .pipeline-node.output { border-color: var(--green); }
    .pipeline-node-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .pipeline-node-sub { font-size: 11px; color: var(--muted); }
    .pipeline-node-status { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 11px; color: var(--muted); }
    .pipeline-arrow { display: flex; align-items: center; padding: 0 8px; color: var(--muted); font-size: 18px; }
    .pipeline-arrow-down { display: flex; justify-content: center; padding: 6px 0; color: var(--muted); font-size: 18px; }
    .pipeline-group { display: flex; flex-direction: column; gap: 8px; }
    .pipeline-group-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .pipeline-section { margin-bottom: 32px; }
    .pipeline-section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

    /* Logs */
    .log-entry { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(42,42,53,0.4); font-size: 12px; }
    .log-time { font-family: var(--mono); color: var(--muted); white-space: nowrap; min-width: 140px; }
    .log-level { min-width: 50px; }
    .log-msg { color: var(--text); flex: 1; }

    /* Password gate */
    .gate { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
    .gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 360px; }
    .gate-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .gate-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .gate-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 14px; outline: none; margin-bottom: 12px; }
    .gate-input:focus { border-color: var(--accent); }
    .gate-error { color: var(--red); font-size: 12px; margin-bottom: 12px; }

    /* Section padding */
    .section { padding: 20px 24px; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .section-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    /* Flex utils */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .ml-auto { margin-left: auto; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .w-full { width: 100%; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 13px; z-index: 9999; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .toast-success { border-color: rgba(34,197,94,0.4); }
    .toast-error { border-color: rgba(239,68,68,0.4); }

    /* Empty state */
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }

    /* Stress bar colors */
    .stress-low { background: var(--green); }
    .stress-med { background: var(--amber); }
    .stress-high { background: var(--red); }

    /* ── Mobile-first responsive layout ─────────────────────────────── */
    /* Desktop: sidebar + main */
    @media (min-width: 768px) {
      .app { flex-direction: row; }
      .sidebar { display: flex !important; width: 220px; min-width: 220px; }
      .sidebar.collapsed { width: 52px; min-width: 52px; }
      .sidebar.collapsed .sidebar-logo .sub,
      .sidebar.collapsed .nav-item span:not(.icon),
      .sidebar.collapsed .nav-label,
      .sidebar.collapsed .sidebar-footer .env-badge { display: none; }
      .sidebar.collapsed .nav-item { justify-content: center; padding: 10px; }
      .sidebar.collapsed .sidebar-logo { padding: 16px 12px; text-align: center; }
      .sidebar.collapsed .brand { font-size: 11px; }
      .sidebar-toggle { display: flex; }
      .bottom-nav { display: none !important; }
      .main { padding-bottom: 0; }
    }
    /* Mobile: hide sidebar, show bottom nav */
    @media (max-width: 767px) {
      .app { flex-direction: column; }
      .sidebar { display: none !important; }
      .sidebar-toggle { display: none; }
      .bottom-nav { display: flex !important; }
      .main { padding-bottom: 64px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); padding: 12px 16px; gap: 8px; }
      .section { padding: 14px 16px; }
      .topbar { padding: 12px 16px; }
      .agent-graph { padding: 14px 16px; }
      .pipeline-node { min-width: 0; width: 100%; }
      .pipeline-row { flex-direction: column; }
      .pipeline-arrow { transform: rotate(90deg); padding: 4px 0; }
      th, td { padding: 8px 10px; font-size: 11px; }
      .gate-card { width: 90%; max-width: 360px; padding: 28px 24px; }
      .toast { bottom: 80px; right: 16px; left: 16px; }
    }

    /* Sidebar toggle button */
    .sidebar-toggle { align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 14px; flex-shrink: 0; }
    .sidebar-toggle:hover { background: var(--surface2); color: var(--text); }

    /* Bottom navigation bar (mobile) */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--surface); border-top: 1px solid var(--border); z-index: 100; align-items: stretch; }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 500; padding: 6px 4px; border: none; background: transparent; }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-item .bnav-icon { font-size: 18px; line-height: 1; }
    .bottom-nav-item .bnav-label { font-size: 9px; letter-spacing: 0.3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Config ──────────────────────────────────────────────────────────────────
const OPS_PASSWORD = "neuroagi2026";

// Config is persisted in localStorage so credentials survive refreshes.
// Override via URL hash: #BRAIN_URL=...&BRAIN_KEY=...&FSCHOOL_URL=...&FSCHOOL_KEY=...
const LS_KEY = "neuroagi_ops_config";
function getConfig() {
  const params = new URLSearchParams(window.location.hash.slice(1));
  // If URL hash has values, use them and save to localStorage
  if (params.get("BRAIN_URL") || params.get("BRAIN_KEY")) {
    const cfg = {
      brainUrl:   params.get("BRAIN_URL")   || "",
      brainKey:   params.get("BRAIN_KEY")   || "",
      fschoolUrl: params.get("FSCHOOL_URL") || "",
      fschoolKey: params.get("FSCHOOL_KEY") || "",
    };
    localStorage.setItem(LS_KEY, JSON.stringify(cfg));
    return cfg;
  }
  // Otherwise load from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
    return {
      brainUrl:   saved.brainUrl   || "",
      brainKey:   saved.brainKey   || "",
      fschoolUrl: saved.fschoolUrl || "",
      fschoolKey: saved.fschoolKey || "",
    };
  } catch { return { brainUrl: "", brainKey: "", fschoolUrl: "", fschoolKey: "" }; }
}
function saveConfig(cfg) {
  localStorage.setItem(LS_KEY, JSON.stringify(cfg));
}

// ── Supabase helpers ─────────────────────────────────────────────────────────
async function sbFetch(baseUrl, key, path, opts = {}) {
  if (!baseUrl || !key) return { data: null, error: "No credentials" };
  try {
    const res = await fetch(`${baseUrl}/rest/v1/${path}`, {
      headers: {
        "apikey": key,
        "Authorization": `Bearer ${key}`,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
        ...opts.headers,
      },
      ...opts,
    });
    if (!res.ok) {
      const text = await res.text();
      return { data: null, error: `${res.status}: ${text.slice(0, 200)}` };
    }
    const data = await res.json();
    return { data, error: null };
  } catch (e) {
    return { data: null, error: e.message };
  }
}

// ── Agent definitions ────────────────────────────────────────────────────────
const AGENTS = [
  // Data sources
  { id: "canvas",       label: "Canvas LMS",          type: "source",  schedule: "On sync",       desc: "Courses, assignments, deadlines" },
  { id: "extension",    label: "Chrome Extension",     type: "source",  schedule: "On activity",   desc: "Browsing signals, file uploads" },
  { id: "chat",         label: "AI Tutor Chat",        type: "source",  schedule: "On message",    desc: "Conversation signals, stress cues" },

  // Brain pipeline
  { id: "brain_signal", label: "brain-signal",         type: "agent",   schedule: "On event",      desc: "Writes behavioral signals to Brain DB" },
  { id: "brain_person", label: "brain-person-link",    type: "agent",   schedule: "On login",      desc: "Links FschoolAI users to Brain DB" },
  { id: "brain_fast",   label: "brain-scheduler-fast", type: "agent",   schedule: "Every 5 min",   desc: "Lightweight context refresh" },
  { id: "brain_full",   label: "brain-scheduler",      type: "agent",   schedule: "Every 1 hr",    desc: "Full context synthesis via Claude" },
  { id: "brain_interv", label: "brain-intervention",   type: "agent",   schedule: "Every 30 min",  desc: "Detects stress/decline → Discord DM" },

  // Tutor agents
  { id: "monitor",      label: "monitor-agent",        type: "agent",   schedule: "On page open",  desc: "Assignment nudge via Claude Haiku" },
  { id: "self_write",   label: "self-write",            type: "agent",   schedule: "Every 6 msgs",  desc: "Mid-session living mind correction" },
  { id: "session_close",label: "session-close",        type: "agent",   schedule: "On chat end",   desc: "Full living mind rewrite" },
  { id: "tutor_impr",   label: "tutor-impression",     type: "agent",   schedule: "On message",    desc: "Writes tutor impressions" },
  { id: "library",      label: "library-agent",        type: "agent",   schedule: "On file upload", desc: "Ingests course content to library" },

  // Outputs
  { id: "discord_dm",   label: "Discord DM",           type: "output",  schedule: "On trigger",    desc: "Proactive intervention messages" },
  { id: "discord_rem",  label: "assignment-reminder",  type: "output",  schedule: "Daily",         desc: "Deadline reminders via Discord" },
  { id: "tutor_resp",   label: "AI Tutor Response",    type: "output",  schedule: "On message",    desc: "Personalised chat responses" },
];

const PIPELINE_SECTIONS = [
  {
    title: "Data Sources",
    nodes: ["canvas", "extension", "chat"],
    layout: "row",
  },
  {
    title: "Brain Pipeline (NeuroAGI Brain DB)",
    nodes: ["brain_signal", "brain_person", "brain_fast", "brain_full", "brain_interv"],
    layout: "row",
  },
  {
    title: "Tutor Agents (FschoolAI DB)",
    nodes: ["monitor", "self_write", "session_close", "tutor_impr", "library"],
    layout: "row",
  },
  {
    title: "Outputs",
    nodes: ["discord_dm", "discord_rem", "tutor_resp"],
    layout: "row",
  },
];

// ── Components ───────────────────────────────────────────────────────────────

function StatusDot({ status }) {
  const cls = status === "ok" ? "dot dot-green dot-pulse"
    : status === "stale" ? "dot dot-amber"
    : status === "error" ? "dot dot-red"
    : "dot dot-gray";
  return <span className={cls} />;
}

function StressBar({ level }) {
  // level is 0-10 integer or 0.0-1.0 float
  const pct = level > 1 ? (level / 10) * 100 : level * 100;
  const cls = pct < 40 ? "stress-low" : pct < 70 ? "stress-med" : "stress-high";
  return (
    <div className="flex items-center gap-2">
      <div className="progress">
        <div className={`progress-fill ${cls}`} style={{ width: `${Math.min(100, pct)}%` }} />
      </div>
      <span className="mono">{Math.round(pct)}%</span>
    </div>
  );
}

function MomentumBadge({ state }) {
  if (!state) return <span className="badge badge-gray">—</span>;
  const map = {
    rising:    ["badge-green", "↑ rising"],
    stable:    ["badge-blue",  "→ stable"],
    declining: ["badge-amber", "↓ declining"],
    stalled:   ["badge-red",   "⊘ stalled"],
    unknown:   ["badge-gray",  "? unknown"],
  };
  const [cls, label] = map[state] || ["badge-gray", state];
  return <span className={`badge ${cls}`}>{label}</span>;
}

function Toast({ msg, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className={`toast toast-${type}`}>
      <span>{type === "success" ? "✓" : "✗"}</span>
      <span>{msg}</span>
    </div>
  );
}

function Spinner() {
  return <div className="spinner" />;
}

// ── Password Gate ─────────────────────────────────────────────────────────────
function PasswordGate({ onAuth }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const submit = () => {
    if (pw === OPS_PASSWORD) { onAuth(); }
    else { setErr("Incorrect password."); }
  };
  return (
    <div className="gate">
      <div className="gate-card">
        <div className="gate-title">NeuroAGI Ops</div>
        <div className="gate-sub">Internal monitoring panel — team access only</div>
        {err && <div className="gate-error">{err}</div>}
        <input
          className="gate-input"
          type="password"
          placeholder="Enter ops password"
          value={pw}
          onChange={e => setPw(e.target.value)}
          onKeyDown={e => e.key === "Enter" && submit()}
          autoFocus
        />
        <button className="btn btn-primary w-full" onClick={submit} style={{ justifyContent: "center" }}>
          Enter
        </button>
        <div style={{ marginTop: 16, fontSize: 11, color: "var(--muted)" }}>
          Configure DB credentials via URL hash:<br />
          <span style={{ fontFamily: "var(--mono)", fontSize: 10 }}>#BRAIN_URL=...&BRAIN_KEY=...&FSCHOOL_URL=...&FSCHOOL_KEY=...</span>
        </div>
      </div>
    </div>
  );
}

// ── Agent Graph ───────────────────────────────────────────────────────────────
function AgentGraph({ config }) {
  const [lastRuns, setLastRuns] = useState({});
  const [loading, setLoading] = useState(false);

  const fetchLastRuns = useCallback(async () => {
    setLoading(true);
    // Try to get last intervention time from Brain DB
    const { data: interventions } = await sbFetch(config.brainUrl, config.brainKey,
      "interventions?select=created_at,status&order=created_at.desc&limit=1");
    // Try to get last signal time from Brain DB
    const { data: signals } = await sbFetch(config.brainUrl, config.brainKey,
      "signals?select=created_at&order=created_at.desc&limit=1");
    // Try to get last context_window update from Brain DB
    const { data: ctx } = await sbFetch(config.brainUrl, config.brainKey,
      "context_window?select=computed_at&order=computed_at.desc&limit=1");

    const runs = {};
    if (interventions?.[0]) runs.brain_interv = interventions[0].created_at;
    if (signals?.[0]) runs.brain_signal = signals[0].created_at;
    if (ctx?.[0]) runs.brain_full = ctx[0].computed_at;
    setLastRuns(runs);
    setLoading(false);
  }, [config]);

  useEffect(() => {
    if (config.brainUrl && config.brainKey) fetchLastRuns();
  }, [config, fetchLastRuns]);

  function agentStatus(agentId) {
    const t = lastRuns[agentId];
    if (!t) return "unknown";
    const age = (Date.now() - new Date(t).getTime()) / 60000; // minutes
    if (age < 10) return "ok";
    if (age < 120) return "stale";
    return "error";
  }

  function formatAge(agentId) {
    const t = lastRuns[agentId];
    if (!t) return "never";
    const age = (Date.now() - new Date(t).getTime()) / 60000;
    if (age < 1) return "just now";
    if (age < 60) return `${Math.round(age)}m ago`;
    if (age < 1440) return `${Math.round(age / 60)}h ago`;
    return `${Math.round(age / 1440)}d ago`;
  }

  const agentMap = Object.fromEntries(AGENTS.map(a => [a.id, a]));

  return (
    <div className="agent-graph">
      <div className="flex items-center gap-2 mb-4">
        <div className="section-title" style={{ margin: 0 }}>Agent Pipeline</div>
        <div className="ml-auto flex gap-2 items-center">
          {loading && <Spinner />}
          <button className="btn btn-ghost btn-sm" onClick={fetchLastRuns}>↻ Refresh</button>
        </div>
      </div>
      <div className="section-sub mb-4">Full data flow from sources through Brain DB to outputs. Live last-run timestamps where data is available.</div>

      {/* Legend */}
      <div className="flex gap-3 mb-4" style={{ flexWrap: "wrap" }}>
        {[
          ["var(--blue)", "Data Source"],
          ["var(--accent)", "Agent"],
          ["var(--green)", "Output"],
          ["dot-green", "Active (<10m)"],
          ["dot-amber", "Stale (<2h)"],
          ["dot-red", "Error / Never"],
        ].map(([color, label], i) => (
          <div key={i} className="flex items-center gap-2" style={{ fontSize: 11, color: "var(--muted)" }}>
            {color.startsWith("dot") ? (
              <span className={`dot ${color}`} />
            ) : (
              <span style={{ width: 10, height: 10, borderRadius: 3, background: color, display: "inline-block", opacity: 0.7 }} />
            )}
            {label}
          </div>
        ))}
      </div>

      {PIPELINE_SECTIONS.map(section => (
        <div key={section.title} className="pipeline-section">
          <div className="pipeline-section-title">{section.title}</div>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {section.nodes.map(id => {
              const agent = agentMap[id];
              if (!agent) return null;
              const borderColor = agent.type === "source" ? "var(--blue)" : agent.type === "output" ? "var(--green)" : "var(--border)";
              const status = agentStatus(id);
              return (
                <div key={id} className="pipeline-node" style={{ borderColor, minWidth: 190 }}>
                  <div className="pipeline-node-title">{agent.label}</div>
                  <div className="pipeline-node-sub">{agent.desc}</div>
                  <div className="pipeline-node-status">
                    <StatusDot status={lastRuns[id] ? status : "unknown"} />
                    <span style={{ fontFamily: "var(--mono)", fontSize: 10 }}>{formatAge(id)}</span>
                    <span style={{ marginLeft: "auto", background: "var(--surface2)", padding: "1px 6px", borderRadius: 3, fontSize: 10 }}>{agent.schedule}</span>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Arrow down between sections */}
          <div className="pipeline-arrow-down" style={{ marginTop: 8 }}>↓</div>
        </div>
      ))}

      {/* Data flow diagram */}
      <div className="card mt-2">
        <div className="card-header">
          <div className="card-title">Data Flow Summary</div>
        </div>
        <div className="card-body" style={{ fontFamily: "var(--mono)", fontSize: 12, lineHeight: 1.8, color: "var(--muted)" }}>
          <div><span style={{ color: "var(--blue)" }}>Canvas LMS</span> → extension-sync → <span style={{ color: "var(--text)" }}>courses / assignments / files</span></div>
          <div><span style={{ color: "var(--blue)" }}>Chrome Extension</span> → brain-signal → <span style={{ color: "var(--text)" }}>signals (Brain DB)</span></div>
          <div><span style={{ color: "var(--blue)" }}>AI Tutor Chat</span> → brain-signal + tutor-impression → <span style={{ color: "var(--text)" }}>signals + tutor_mind</span></div>
          <div style={{ marginTop: 8 }}>signals → <span style={{ color: "var(--accent)" }}>brain-scheduler-fast</span> (5m) → context_window (lightweight)</div>
          <div>signals + context → <span style={{ color: "var(--accent)" }}>brain-scheduler</span> (1h) → context_window (full Claude synthesis)</div>
          <div>context_window → <span style={{ color: "var(--accent)" }}>brain-intervention</span> (30m) → stress check → <span style={{ color: "var(--green)" }}>Discord DM</span></div>
          <div style={{ marginTop: 8 }}>context_window → <span style={{ color: "var(--accent)" }}>tutor-context</span> → NeuralRing system prompt → <span style={{ color: "var(--green)" }}>personalised chat</span></div>
          <div>assignment open → <span style={{ color: "var(--accent)" }}>monitor-agent</span> → nudge → <span style={{ color: "var(--green)" }}>inline notification</span></div>
          <div>chat end → <span style={{ color: "var(--accent)" }}>session-close</span> → <span style={{ color: "var(--green)" }}>living mind (tutor_mind)</span></div>
        </div>
      </div>
    </div>
  );
}

// ── Student Monitor ───────────────────────────────────────────────────────────
function StudentMonitor({ config, toast }) {
  const [students, setStudents] = useState([]);
  const [brainData, setBrainData] = useState({});
  const [interventions, setInterventions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [triggering, setTriggering] = useState({});
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const loadData = useCallback(async () => {
    setLoading(true);

    // Load students from FschoolAI DB
    const { data: users } = await sbFetch(config.fschoolUrl, config.fschoolKey,
      "users?select=id,name,email,brain_person_id,gpa,streak,created_at&order=name.asc&limit=200");

    // Load context windows from Brain DB
    const { data: ctxRows } = await sbFetch(config.brainUrl, config.brainKey,
      "context_window?select=person_id,stress_level,momentum_state,active_deadline,recent_summary,what_to_focus_on,computed_at,expires_at&order=computed_at.desc");

    // Load recent interventions from Brain DB
    const { data: intervRows } = await sbFetch(config.brainUrl, config.brainKey,
      "interventions?select=person_id,trigger_reason,message,status,created_at&order=created_at.desc&limit=100");

    // Load signal counts from Brain DB
    const { data: persons } = await sbFetch(config.brainUrl, config.brainKey,
      "persons?select=id,fschool_user_id,name");

    if (users) setStudents(users);

    // Build brain data map by fschool_user_id
    const brainMap = {};
    if (persons && ctxRows) {
      const personByFschool = {};
      persons.forEach(p => { personByFschool[p.fschool_user_id] = p; });

      ctxRows.forEach(ctx => {
        const person = persons.find(p => p.id === ctx.person_id);
        if (person?.fschool_user_id) {
          brainMap[person.fschool_user_id] = { ...ctx, person };
        }
      });
    }
    setBrainData(brainMap);

    // Build intervention map by person_id
    const intervMap = {};
    if (intervRows) {
      intervRows.forEach(i => {
        if (!intervMap[i.person_id]) intervMap[i.person_id] = [];
        intervMap[i.person_id].push(i);
      });
    }
    setInterventions(intervMap);

    setLoading(false);
  }, [config]);

  useEffect(() => {
    if (config.fschoolUrl && config.fschoolKey) loadData();
  }, [config, loadData]);

  const triggerAgent = async (userId, agentName) => {
    setTriggering(t => ({ ...t, [userId + agentName]: true }));
    try {
      // Trigger the brain-scheduler for this specific user
      const endpoint = agentName === "brain-scheduler"
        ? `https://fschoolai.com/api/brain-scheduler`
        : agentName === "brain-intervention"
        ? `https://fschoolai.com/api/brain-intervention`
        : null;

      if (!endpoint) {
        toast("Agent trigger not supported for this agent", "error");
        return;
      }

      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-cron-secret": "manual-trigger" },
        body: JSON.stringify({ userId, manual: true }),
      });
      if (res.ok) {
        toast(`Triggered ${agentName} for user`, "success");
        setTimeout(loadData, 2000);
      } else {
        toast(`Agent returned ${res.status}`, "error");
      }
    } catch (e) {
      toast(e.message, "error");
    } finally {
      setTriggering(t => ({ ...t, [userId + agentName]: false }));
    }
  };

  const filtered = students.filter(s => {
    const brain = brainData[s.id];
    if (filter === "no-brain") return !s.brain_person_id;
    if (filter === "high-stress") {
      const stress = brain?.stress_level ?? 0;
      return stress > 0.7 || stress > 7;
    }
    if (filter === "stalled") return brain?.momentum_state === "stalled" || brain?.momentum_state === "declining";
    if (search) return s.name?.toLowerCase().includes(search.toLowerCase()) || s.email?.toLowerCase().includes(search.toLowerCase());
    return true;
  });

  const stats = {
    total: students.length,
    withBrain: students.filter(s => s.brain_person_id).length,
    highStress: students.filter(s => {
      const b = brainData[s.id];
      const sl = b?.stress_level ?? 0;
      return sl > 0.7 || sl > 7;
    }).length,
    interventionsToday: Object.values(interventions).flat().filter(i => {
      return new Date(i.created_at) > new Date(Date.now() - 86400000);
    }).length,
  };

  return (
    <div>
      {/* Stats */}
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Total Students</div>
          <div className="stat-value">{stats.total}</div>
          <div className="stat-sub">registered users</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Brain Linked</div>
          <div className="stat-value" style={{ color: stats.withBrain > 0 ? "var(--green)" : "var(--amber)" }}>{stats.withBrain}</div>
          <div className="stat-sub">of {stats.total} have brain profiles</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">High Stress</div>
          <div className="stat-value" style={{ color: stats.highStress > 0 ? "var(--red)" : "var(--green)" }}>{stats.highStress}</div>
          <div className="stat-sub">stress level &gt; 70%</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Interventions Today</div>
          <div className="stat-value" style={{ color: "var(--accent)" }}>{stats.interventionsToday}</div>
          <div className="stat-sub">Discord DMs sent</div>
        </div>
      </div>

      {/* Filters + search */}
      <div className="section" style={{ paddingTop: 0 }}>
        <div className="flex items-center gap-2 mb-3" style={{ flexWrap: "wrap" }}>
          {[
            ["all", "All Students"],
            ["no-brain", "No Brain Profile"],
            ["high-stress", "High Stress"],
            ["stalled", "Stalled / Declining"],
          ].map(([val, label]) => (
            <button
              key={val}
              className={`btn btn-sm ${filter === val ? "btn-primary" : "btn-ghost"}`}
              onClick={() => setFilter(val)}
            >{label}</button>
          ))}
          <input
            style={{ marginLeft: "auto", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 6, padding: "5px 10px", color: "var(--text)", fontSize: 12, outline: "none", width: 200 }}
            placeholder="Search name or email…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <button className="btn btn-ghost btn-sm" onClick={loadData} disabled={loading}>
            {loading ? <Spinner /> : "↻ Refresh"}
          </button>
        </div>

        <div className="card">
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Brain</th>
                  <th>Stress</th>
                  <th>Momentum</th>
                  <th>Last Context</th>
                  <th>Interventions</th>
                  <th>GPA</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 && (
                  <tr><td colSpan={8} style={{ textAlign: "center", padding: 32, color: "var(--muted)" }}>
                    {loading ? "Loading…" : "No students found"}
                  </td></tr>
                )}
                {filtered.map(s => {
                  const brain = brainData[s.id];
                  const person = brain?.person;
                  const intervList = person ? (interventions[person.id] || []) : [];
                  const lastInterv = intervList[0];
                  const stressLevel = brain?.stress_level ?? null;
                  const contextAge = brain?.computed_at
                    ? Math.round((Date.now() - new Date(brain.computed_at).getTime()) / 60000)
                    : null;
                  const contextFresh = contextAge !== null && contextAge < 120;

                  return (
                    <tr key={s.id}>
                      <td>
                        <div className="name-cell">{s.name || "—"}</div>
                        <div className="email-cell">{s.email}</div>
                      </td>
                      <td>
                        {s.brain_person_id ? (
                          <span className="badge badge-green">✓ linked</span>
                        ) : (
                          <span className="badge badge-gray">not linked</span>
                        )}
                      </td>
                      <td>
                        {stressLevel !== null ? (
                          <StressBar level={stressLevel} />
                        ) : (
                          <span className="mono">—</span>
                        )}
                      </td>
                      <td>
                        <MomentumBadge state={brain?.momentum_state} />
                      </td>
                      <td>
                        {contextAge !== null ? (
                          <span className={`mono ${contextFresh ? "" : ""}` } style={{ color: contextFresh ? "var(--green)" : contextAge < 360 ? "var(--amber)" : "var(--red)" }}>
                            {contextAge < 60 ? `${contextAge}m ago` : `${Math.round(contextAge / 60)}h ago`}
                          </span>
                        ) : (
                          <span className="mono" style={{ color: "var(--muted)" }}>no data</span>
                        )}
                      </td>
                      <td>
                        {intervList.length > 0 ? (
                          <div>
                            <span className="badge badge-purple">{intervList.length} total</span>
                            {lastInterv && (
                              <div className="mono mt-1" style={{ fontSize: 10 }}>
                                last: {new Date(lastInterv.created_at).toLocaleDateString()}
                              </div>
                            )}
                          </div>
                        ) : (
                          <span className="mono">—</span>
                        )}
                      </td>
                      <td>
                        <span className="mono">{s.gpa ? parseFloat(s.gpa).toFixed(2) : "—"}</span>
                      </td>
                      <td>
                        <div className="flex gap-2">
                          <button
                            className="btn btn-ghost btn-sm"
                            disabled={!s.brain_person_id || triggering[s.id + "brain-scheduler"]}
                            onClick={() => triggerAgent(s.id, "brain-scheduler")}
                            title="Run brain-scheduler for this student"
                          >
                            {triggering[s.id + "brain-scheduler"] ? <Spinner /> : "⚡ Brain"}
                          </button>
                          <button
                            className="btn btn-ghost btn-sm"
                            disabled={!s.brain_person_id || triggering[s.id + "brain-intervention"]}
                            onClick={() => triggerAgent(s.id, "brain-intervention")}
                            title="Run intervention check for this student"
                          >
                            {triggering[s.id + "brain-intervention"] ? <Spinner /> : "📨 DM"}
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

                ["Vercel Dashboard", "https://vercel.com/dashboard"],
                ["Brain DB", "https://supabase.com/dashboard/project/qiolhlvqfzujnkwnymft"],
                ["GitHub Repo", "https://github.com/vincentyang0702-pixel/FschoolAI-"],
              ].map(([label, url]) => (
                <a key={label} href={url} target="_blank" rel="noopener noreferrer"
                  className="nav-item" style={{ textDecoration: "none", fontSize: 12 }}>
                  <span className="icon">↗</span>{label}
                </a>
              ))}
            </div>
          )}
        </div>
        <div className="sidebar-footer">
          <div className="env-badge">{hasCredentials ? "● DB connected" : "○ No creds"}</div>
        </div>
      </div>

      {/* Main content */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title" style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {navItems.find(n => n.id === tab)?.label}
          </div>
          <div className="topbar-actions">
            {!hasCredentials && (
              <span style={{ fontSize: 11, color: "var(--amber)", display: "none" }} className="creds-warn">
                ⚠ No credentials
              </span>
            )}
            {!hasCredentials && (
              <button className="btn btn-ghost btn-sm" style={{ color: "var(--amber)", borderColor: "rgba(245,158,11,0.4)" }}
                onClick={() => setTab("config")}>
                ⚠ Add Credentials
              </button>
            )}
            <button className="btn btn-ghost btn-sm" onClick={() => { sessionStorage.removeItem("ops_authed"); setAuthed(false); }}>
              🔒 Lock
            </button>
          </div>
        </div>

        {tab === "graph"    && <AgentGraph config={config} />}
        {tab === "students" && <StudentMonitor config={config} toast={showToast} />}
        {tab === "log"      && <InterventionLog config={config} />}
        {tab === "config"   && <ConfigPanel config={config} onSave={setConfig} />}
      </div>

      {/* Bottom nav (mobile only) */}
      <nav className="bottom-nav">
        {navItems.map(item => (
          <button
            key={item.id}
            className={`bottom-nav-item ${tab === item.id ? "active" : ""}`}
            onClick={() => setTab(item.id)}
          >
            <span className="bnav-icon">{item.icon}</span>
            <span className="bnav-label">{item.label}</span>
          </button>
        ))}
        <button
          className="bottom-nav-item"
          onClick={() => { sessionStorage.removeItem("ops_authed"); setAuthed(false); }}
        >
          <span className="bnav-icon">🔒</span>
          <span className="bnav-label">Lock</span>
        </button>
      </nav>

      {toastMsg && (
        <Toast msg={toastMsg.msg} type={toastMsg.type} onClose={() => setToastMsg(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
