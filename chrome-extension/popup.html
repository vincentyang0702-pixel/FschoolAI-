<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FschoolAI Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      min-height: 240px;
      background: #0f0f12;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .logo {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4285F4, #30d158);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #f0f0f0; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.35); }

    #status-section, #signed-out-section, #pending-section { padding: 16px; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600; margin-bottom: 12px;
    }
    .status-pill.on  { background: rgba(48,209,88,0.12); color: #30d158; border: 1px solid rgba(48,209,88,0.2); }
    .status-pill.off { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.08); }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.on  { background: #30d158; }
    .dot.off { background: rgba(255,255,255,0.2); }

    .btn {
      display: block; width: 100%;
      padding: 10px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary  { background: #4285F4; color: #fff; margin-bottom: 8px; }
    .btn-danger   { background: rgba(255,69,58,0.12); color: #ff6961; }
    .btn-open     { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }

    .uid { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 12px; word-break: break-all; }

    .pending-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.55); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pending-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px; border-radius: 8px;
      background: rgba(255,255,255,0.03); margin-bottom: 6px;
    }
    .pending-name { flex: 1; font-size: 12px; color: rgba(255,255,255,0.7); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pending-btn {
      padding: 4px 10px; border-radius: 6px; border: none;
      background: rgba(66,133,244,0.18); color: #4285F4;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; flex-shrink: 0;
    }

    .empty { color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; padding: 12px 0; }

    .input {
      display: block; width: 100%;
      padding: 10px 12px; margin-bottom: 10px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #f0f0f0;
      font-size: 13px; font-family: inherit; outline: none;
    }
    .input:focus { border-color: #4285F4; }
    .switch { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-top: 10px; }
    .switch a { color: #4285F4; cursor: pointer; text-decoration: none; }
    .auth-error {
      background: rgba(255,69,58,0.12); color: #ff6961;
      border: 1px solid rgba(255,69,58,0.2); border-radius: 8px;
      padding: 8px 10px; font-size: 12px; margin-bottom: 10px;
    }

    /* Live activity card — proves the extension is working, not a static screen */
    .live {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 12px; margin-bottom: 14px;
    }
    .live-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.25); transition: background 0.2s; }
    .live-dot.scanning { background: #4285F4; box-shadow: 0 0 8px rgba(66,133,244,0.85); animation: livePulse 1.1s ease-in-out infinite; }
    .live-dot.idle     { background: #30d158; box-shadow: 0 0 6px rgba(48,209,88,0.5); }
    .live-title { flex: 1; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .live-spinner {
      width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #4285F4; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    .live-counts { display: flex; align-items: baseline; gap: 6px; }
    .live-num { font-size: 22px; font-weight: 800; color: #f0f0f0; line-height: 1; }
    .live-cap { font-size: 11px; color: rgba(255,255,255,0.4); }
    .live-total { font-size: 11px; color: rgba(255,255,255,0.28); margin-left: auto; }
    .live-recent { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .live-recent:empty { display: none; }
    .live-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.5); }
    .live-item .ic { width: 12px; text-align: center; flex-shrink: 0; }
    .live-item .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .live-item.done    .ic { color: #30d158; }
    .live-item.skipped .ic { color: rgba(255,255,255,0.35); }
    .live-item.failed  .ic { color: #ff6961; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">F</div>
    <div>
      <div class="header-title">FschoolAI</div>
      <div class="header-sub">LMS File Importer</div>
    </div>
  </div>

  <!-- Signed in -->
  <div id="status-section" style="display:none">
    <div id="status-pill" class="status-pill on">
      <span class="dot on"></span>
      <span id="status-label">Connected</span>
    </div>
    <div class="uid" id="uid-label"></div>

    <div class="live" id="live-card">
      <div class="live-head">
        <span class="live-dot idle" id="live-dot"></span>
        <span class="live-title" id="live-title">Ready</span>
        <span class="live-spinner" id="live-spinner" style="display:none"></span>
      </div>
      <div class="live-counts">
        <span class="live-num" id="live-session">0</span>
        <span class="live-cap">files imported</span>
        <span class="live-total" id="live-total"></span>
      </div>
      <div class="live-recent" id="live-recent"></div>
    </div>

    <label style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 0; font-size:12px; color:rgba(255,255,255,0.7); cursor:pointer">
      <span>Auto-capture files on LMS pages</span>
      <input type="checkbox" id="toggle-auto-capture" style="accent-color:#4285F4" />
    </label>
    <label style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:0 0 10px; font-size:12px; color:rgba(255,255,255,0.7); cursor:pointer">
      <span>Auto-import my downloads</span>
      <input type="checkbox" id="toggle-auto-downloads" style="accent-color:#4285F4" />
    </label>

    <button class="btn btn-open" id="btn-open-app">Open FschoolAI →</button>
    <button class="btn btn-danger" id="btn-sign-out" style="margin-top:8px">Sign out</button>
  </div>

  <!-- Signed out -->
  <div id="signed-out-section" style="display:none">
    <div id="auth-error" class="auth-error" style="display:none"></div>

    <!-- Login -->
    <div id="login-form">
      <input id="login-email"    class="input" type="email"    placeholder="Email"    autocomplete="username" />
      <input id="login-password" class="input" type="password" placeholder="Password" autocomplete="current-password" />
      <button class="btn btn-primary" id="btn-login">Log in</button>
      <div class="switch">No account? <a id="show-signup">Create one</a></div>
    </div>

    <!-- Sign up -->
    <div id="signup-form" style="display:none">
      <input id="signup-name"     class="input" type="text"     placeholder="Full name" />
      <input id="signup-email"    class="input" type="email"    placeholder="Email" autocomplete="username" />
      <input id="signup-password" class="input" type="password" placeholder="Password (min 6 chars)" autocomplete="new-password" />
      <button class="btn btn-primary" id="btn-signup">Create account</button>
      <div class="switch">Have an account? <a id="show-login">Log in</a></div>
    </div>
  </div>

  <!-- Pending downloads (Mode B) -->
  <div id="pending-section" style="display:none; border-top:1px solid rgba(255,255,255,0.06)">
    <div style="padding:12px 16px 0">
      <div class="pending-title">Captured downloads</div>
      <div id="pending-list"></div>
      <button class="btn btn-open" id="btn-clear-pending" style="margin-top:6px;font-size:11px;padding:6px">
        Clear all
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
